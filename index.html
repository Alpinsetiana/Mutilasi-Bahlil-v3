<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pukul Bahlil - Edisi 2 Menit</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            background-color: #1a1a1a; color: white;
            font-family: 'Arial', sans-serif; overflow: hidden;
        }
        canvas {
            border: 5px solid #444;
            background: linear-gradient(to bottom, #2c3e50, #000);
            cursor: crosshair;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }
        .stats { font-size: 24px; margin: 10px; text-shadow: 2px 2px #ff0000; font-weight: bold; }
        #startBtn {
            padding: 20px 40px; font-size: 24px; background: #cc0000;
            color: white; border: none; cursor: pointer;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 100;
            border-radius: 10px; font-weight: bold;
            box-shadow: 0 0 30px rgba(255,0,0,0.7);
            transition: 0.3s;
        }
        #startBtn:hover { background: #ff0000; transform: translate(-50%, -50%) scale(1.1); }
    </style>
</head>
<body>

    <div class="stats">Skor: <span id="score">0</span> | Sisa Waktu: <span id="timer">120</span>s</div>
    <button id="startBtn">MULAI GAME (2 MENIT) & MUSIK</button>
    
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <audio id="bgMusic" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const bgMusic = document.getElementById('bgMusic');

        let score = 0;
        let timeLeft = 120; // Waktu diubah menjadi 120 detik (2 menit)
        let gameActive = false;
        let bloodSplats = [];

        // Load Gambar
        const targetImg = new Image();
        targetImg.src = 'bahlil.jpg'; 

        let target = {
            x: 400, y: 250,
            width: 110, height: 130
        };

        // Fungsi Dekorasi (Bensin & Sawit)
        function drawDecorations() {
            ctx.font = "50px Arial";
            for(let i=0; i<4; i++) {
                ctx.fillText("⛽", 20, 100 + (i*110));
                ctx.fillText("🌴", 730, 100 + (i*110));
            }
        }

        // Efek Darah Sadis
        function createBlood(x, y) {
            for (let i = 0; i < 25; i++) {
                bloodSplats.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    radius: Math.random() * 7 + 2,
                    life: 45
                });
            }
        }

        // Loop Animasi Utama
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawDecorations();

            // Render Darah
            bloodSplats.forEach((s, i) => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(220, 0, 0, ${s.life/45})`;
                ctx.fill();
                s.x += s.vx; s.y += s.vy; s.life--;
                if(s.life <= 0) bloodSplats.splice(i, 1);
            });

            // Gambar Karakter Target
            if (gameActive) {
                ctx.drawImage(targetImg, target.x, target.y, target.width, target.height);
            }

            requestAnimationFrame(draw);
        }

        // Mulai Game
        startBtn.addEventListener('click', () => {
            gameActive = true;
            startBtn.style.display = 'none';
            bgMusic.play().catch(e => console.log("Musik gagal putar:", e));
            
            moveTarget();
            
            // Timer 2 Menit
            const timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if(timeLeft <= 0) {
                    gameActive = false;
                    clearInterval(timerInterval);
                    bgMusic.pause();
                    alert("Waktu Habis! Skor Kamu: " + score);
                    location.reload();
                }
            }, 1000);
        });

        // Logika Perpindahan Target
        function moveTarget() {
            if(!gameActive) return;
            target.x = Math.random() * (canvas.width - 150) + 50;
            target.y = Math.random() * (canvas.height - 150) + 50;
            
            // Kecepatan pindah target (800ms)
            setTimeout(moveTarget, 800); 
        }

        // Deteksi Klik / Pukulan
        canvas.addEventListener('mousedown', (e) => {
            if(!gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            if(mx > target.x && mx < target.x + target.width &&
               my > target.y && my < target.y + target.height) {
                
                score += 10;
                scoreElement.innerText = score;
                createBlood(mx, my);
                target.x = -300; // Sembunyikan target sementara setelah dipukul
            }
        });

        draw();
    </script>
</body>
</html>
